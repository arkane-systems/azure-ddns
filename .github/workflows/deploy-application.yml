name: Deploy Application

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to deploy from
        required: true
        default: dev
      functionAppName:
        description: Target Azure Function App name
        required: true
      runTests:
        description: Run unit tests before publish
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Print deployment context
        run: |
          echo "Ref: ${{ inputs.ref }}"
          echo "Function App: ${{ inputs.functionAppName }}"
          echo "Run tests: ${{ inputs.runTests }}"

      - name: Validate required repository files
        run: |
          test -f azure-ddns.slnx
          test -f src/AzureDdns.FunctionApp/AzureDdns.FunctionApp.csproj

      - name: Validate required inputs
        run: |
          test -n "${{ inputs.functionAppName }}"

      - name: Validate required Azure OIDC secrets are present
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          test -n "$AZURE_CLIENT_ID"
          test -n "$AZURE_TENANT_ID"
          test -n "$AZURE_SUBSCRIPTION_ID"

  deploy-app:
    name: Build and deploy Function App
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore azure-ddns.slnx

      - name: Build solution
        run: dotnet build azure-ddns.slnx --configuration Release --no-restore

      - name: Run tests
        if: ${{ inputs.runTests }}
        run: dotnet test azure-ddns.slnx --configuration Release --no-build

      - name: Publish Function App
        run: >-
          dotnet publish src/AzureDdns.FunctionApp/AzureDdns.FunctionApp.csproj
          --configuration Release
          --output ./artifacts/functionapp

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy function package
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ inputs.functionAppName }}
          package: ./artifacts/functionapp
