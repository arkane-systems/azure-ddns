name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to deploy from
        required: true
        default: dev
      resourceGroup:
        description: Azure resource group that hosts the Function App infrastructure
        required: true
      runWhatIf:
        description: Run ARM what-if before deployment
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Print deployment context
        run: |
          echo "Ref: ${{ inputs.ref }}"
          echo "Resource Group: ${{ inputs.resourceGroup }}"
          echo "Run what-if: ${{ inputs.runWhatIf }}"

      - name: Validate required repository files
        run: |
          test -f infra/main.bicep
          test -f infra/main.parameters.json

      - name: Validate required Azure OIDC secrets are present
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          test -n "$AZURE_CLIENT_ID"
          test -n "$AZURE_TENANT_ID"
          test -n "$AZURE_SUBSCRIPTION_ID"

  deploy-infra:
    name: Deploy Bicep infrastructure
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep compile
        run: az bicep build --file infra/main.bicep

      - name: Preview infrastructure changes (what-if)
        if: ${{ inputs.runWhatIf }}
        run: >-
          az deployment group what-if
          --name infra-preview-${{ github.run_id }}
          --resource-group ${{ inputs.resourceGroup }}
          --template-file infra/main.bicep
          --parameters @infra/main.parameters.json

      - name: Deploy infrastructure
        run: >-
          az deployment group create
          --name infra-apply-${{ github.run_id }}
          --resource-group ${{ inputs.resourceGroup }}
          --template-file infra/main.bicep
          --parameters @infra/main.parameters.json
